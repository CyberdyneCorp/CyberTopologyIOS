name: CyberTopology
options:
  bundleIdPrefix: com.cyberdynecorp
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "2"
    SUPPORTS_MACCATALYST: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    # Team pinned here because the .xcodeproj is regenerated: anything set in
    # the Xcode UI is lost on the next `xcodegen generate`.
    DEVELOPMENT_TEAM: 2C69VJZSNR
    # The engine xcframework ships ios-arm64 + ios-arm64-simulator only
    # (scripts/build_engine.sh); Intel simulators are not supported.
    "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64

packages:
  CyberKit:
    path: CyberKit

targets:
  CyberTopology:
    type: application
    platform: iOS
    sources:
      - App/Sources
      - App/Resources
    dependencies:
      - package: CyberKit
    preBuildScripts:
      - name: Build CyberRemesherAndUV engine (if missing)
        script: |
          # Idempotent: exits immediately when Engine/build is current.
          cd "$SRCROOT" && scripts/build_engine.sh
        basedOnDependencyAnalysis: false
    info:
      path: App/Resources/Info.plist
      properties:
        UISupportsDocumentBrowser: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: CyberTopology Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSTypeIsPackage: true
            LSItemContentTypes:
              - com.cyberdynecorp.cybertopology.document
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.cyberdynecorp.cybertopology.document
            UTTypeDescription: CyberTopology Document
            UTTypeConformsTo:
              - com.apple.package
            UTTypeTagSpecification:
              public.filename-extension:
                - cybertopo
        CFBundleDisplayName: CyberTopology
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        LSSupportsOpeningDocumentsInPlace: true
        UIFileSharingEnabled: true
    settings:
      base:
        # The engine pre-build script writes Engine/build + CyberKit/Binaries.
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.cyberdynecorp.cybertopology
        PRODUCT_NAME: CyberTopology
        GENERATE_INFOPLIST_FILE: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0

  CyberTopologyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - App/Tests
    dependencies:
      - target: CyberTopology
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.cyberdynecorp.cybertopology.tests

  CyberTopologyUITests:
    type: bundle.ui-testing
    platform: iOS
    dependencies:
      - target: CyberTopology
    sources:
      - App/UITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.cyberdynecorp.cybertopology.uitests
        TEST_TARGET_NAME: CyberTopology

schemes:
  CyberTopology:
    build:
      targets:
        CyberTopology: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
        - CyberTopology
        - package: CyberKit/CyberKit
      targets:
        - CyberTopologyTests
        - CyberTopologyUITests
        - package: CyberKit/CyberKitTests
    archive:
      config: Release
