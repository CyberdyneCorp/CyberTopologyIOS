name: CyberTopology
options:
  bundleIdPrefix: com.cyberdynecorp
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "2"
    SUPPORTS_MACCATALYST: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    # Team pinned here because the .xcodeproj is regenerated: anything set in
    # the Xcode UI is lost on the next `xcodegen generate`.
    DEVELOPMENT_TEAM: 2C69VJZSNR
    # The engine xcframework ships ios-arm64 + ios-arm64-simulator only
    # (scripts/build_engine.sh); Intel simulators are not supported.
    "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64

packages:
  CyberKit:
    path: CyberKit

targets:
  CyberTopology:
    type: application
    platform: iOS
    sources:
      - App/Sources
      - App/Resources
    dependencies:
      - package: CyberKit
        product: CyberKit
      # Stroke capture (task 3.1) records live input in the task-1.1b
      # StrokeSample format and feeds StrokeConsumer; the recorder side is
      # app code so dogfooding sessions can save replayable fixtures.
      - package: CyberKit
        product: CyberKitTesting
    preBuildScripts:
      - name: Build CyberRemesherAndUV engine (if missing)
        script: |
          # Idempotent: exits immediately when Engine/build is current.
          cd "$SRCROOT" && scripts/build_engine.sh
        basedOnDependencyAnalysis: false
    info:
      path: App/Resources/Info.plist
      properties:
        UISupportsDocumentBrowser: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: CyberTopology Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSTypeIsPackage: true
            LSItemContentTypes:
              - com.cyberdynecorp.cybertopology.document
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.cyberdynecorp.cybertopology.document
            UTTypeDescription: CyberTopology Document
            UTTypeConformsTo:
              - com.apple.package
            UTTypeTagSpecification:
              public.filename-extension:
                - cybertopo
        CFBundleDisplayName: CyberTopology
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        LSSupportsOpeningDocumentsInPlace: true
        UIFileSharingEnabled: true
    settings:
      base:
        # The engine pre-build script writes Engine/build + CyberKit/Binaries.
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.cyberdynecorp.cybertopology
        PRODUCT_NAME: CyberTopology
        GENERATE_INFOPLIST_FILE: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0

  CyberTopologyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - App/Tests
      # Engine-op regression suites SHARED from CyberKitTests so they run on
      # DEVICE too — CyberKitTests is tool-hosted (simulator-only), so these
      # Phase 4 engine ops were previously verified only on the simulator.
      # Both use plain `import CyberKit` public API with inline OBJ fixtures
      # (no #filePath goldens, no Bundle.module), so they compile and run in
      # the app-hosted target unchanged. They still run in CyberKitTests on the
      # simulator; here they add the missing on-device coverage.
      - path: CyberKit/Tests/CyberKitTests/MeshIDCompactionTests.swift
      - path: CyberKit/Tests/CyberKitTests/SymmetryOpsTests.swift
      - path: CyberKit/Tests/CyberKitTests/AnnotationOpsTests.swift
      # Golden-bearing engine-op suites: the #filePath byte-goldens are guarded
      # behind #if targetEnvironment(simulator), so on device these run their
      # structural assertions (Catmull-Clark math, winding, determinism,
      # pin-honoring) while the golden comparisons stay simulator-only.
      - path: CyberKit/Tests/CyberKitTests/BuildToolsOpsTests.swift
      - path: CyberKit/Tests/CyberKitTests/PlacementOpsTests.swift
      - path: CyberKit/Tests/CyberKitTests/BatchOpsTests.swift
      - path: CyberKit/Tests/CyberKitTests/SubdivisionPreviewTests.swift
      - path: CyberKit/Tests/CyberKitTests/MeshEditingTests.swift
      # Weave solver session (Phase 5): public-API + inline fixtures, so it runs
      # on device too (the auto-remesh backend + determinism verified on iPad).
      - path: CyberKit/Tests/CyberKitTests/WeaveSolverTests.swift
      # Mesh fixtures the integration tests import, bundled into the test
      # target so they load on a physical device too (a #filePath / absolute
      # Mac path only resolves on the simulator's shared filesystem). This
      # target is APP-HOSTED, so its tests run on the iPad — unlike the
      # tool-hosted CyberKitTests, which are simulator-only.
      - path: CyberKit/Tests/CyberKitTests/Fixtures/cube_colored.obj
        buildPhase: resources
      - path: CyberKit/Tests/CyberKitTests/Fixtures/cube_colored.fbx
        buildPhase: resources
      # Real scanned Targets (bunny / armadillo) for the on-device real-target
      # integration tests. See App/TestFixtures/PROVENANCE.md.
      - path: App/TestFixtures/stanford-bunny.obj
        buildPhase: resources
      - path: App/TestFixtures/armadillo.obj
        buildPhase: resources
    dependencies:
      - target: CyberTopology
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.cyberdynecorp.cybertopology.tests

  CyberTopologyUITests:
    type: bundle.ui-testing
    platform: iOS
    dependencies:
      - target: CyberTopology
    sources:
      - App/UITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.cyberdynecorp.cybertopology.uitests
        TEST_TARGET_NAME: CyberTopology

schemes:
  CyberTopology:
    build:
      targets:
        CyberTopology: all
    run:
      config: Debug
      # Pressing Play opens a seeded document directly: without this, a
      # fresh install lands on the EMPTY system document browser, which in
      # dark mode renders as a near-black screen and reads as a hang.
      # Toggle these off in Edit Scheme for testing the raw browser flow
      # (note: xcodegen regeneration restores them from here).
      commandLineArguments:
        "-UITestOpenDocument": true
        "-UITestSeedTarget": true
        "-UITestSeedEditMesh": true
    test:
      config: Debug
      # Coverage is gathered for ALL targets (no coverageTargets list): with
      # onlyGenerateCoverageForSpecifiedTargets, xcodebuild silently drops
      # the CyberKit SwiftPM product from instrumentation and the per-layer
      # gate (scripts/coverage_gate.sh) sees no CyberKit/Sources files at
      # all. The gate filters by source-path prefix, so over-collection is
      # harmless.
      gatherCoverageData: true
      targets:
        - CyberTopologyTests
        - CyberTopologyUITests
        - package: CyberKit/CyberKitTests
    archive:
      config: Release
