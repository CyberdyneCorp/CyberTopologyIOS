# Spec scenario -> test traceability map (design D9, spec: quality-assurance).
#
# Checked in CI by scripts/check_traceability.py against every
# '#### Scenario:' heading in openspec/changes/add-cybertopology-app/specs/*/spec.md.
#
# Format:
#   scenarios:
#     <capability>:              # spec directory name
#       <scenario name>:         # text after '#### Scenario: '
#         - <TestClass/testMethod>   # XCUITest / integration XCTest identifiers
#   pending:
#     <capability>:
#       - <scenario name>        # spec'd, not yet implemented
#
# Every spec scenario must appear exactly once: either mapped to tests or in
# the pending allowlist. The pending list exists so CI stays green during
# bootstrap while keeping the debt visible — it must only shrink as tasks land.

scenarios:
  document-model:
    Deep undo:
      - UndoJournalTests/deepUndo
      - TopoDocumentUndoTests/deepUndoReturnsToInitialState
    Gesture undo/redo:
      - CyberTopologyUITests/testUndoRedoGesturesAndButtons
      - MetalViewportTests/fallbackViewKeepsUndoGestureOverlay
    Files app visibility:
      - CyberTopologyUITests/testAppLaunchesIntoDocumentBrowser
    Free-tier save:
      - CyberTopologyUITests/testOpenAndCloseDocument
    Stage state round-trip:
      - CyberTopologyUITests/testStageEditSurvivesRelaunch
      - TopoDocumentTests/editedStagePersistsAcrossReopen
    Save new version:
      - CyberTopologyUITests/testSaveNewVersion
      - TopoDocumentTests/saveNewVersionCreatesSiblingAndKeepsOriginal
    Crash recovery:
      - RecoveryJournalPersistenceTests/activeSessionWithExistingFileIsRecovered
    # Task 3.3: every verb routes created/moved vertices through the engine
    # SurfaceSnapper before the journaled command commits — engine ops
    # through CyberKit (create-face/tweak/relax against a plane target) plus
    # the fixture-replay integration test where the authored quad lands on
    # the seeded DOMED target (no z=0 point under the stroke, so the assert
    # cannot pass without real projection).
    EditMesh vertex snapping:
      - MeshEditingTests/createFaceSnapsNewVerticesOntoTargetSurface
      - MeshEditingTests/tweakVertexSnapsToTarget
      - MeshEditingTests/relaxKeepsVerticesOnTarget
      - MeshEditControllerTests/squareFixtureCreatesJournaledQuadOnSeededTarget
  retopology-tools:
    # Task 4.2: the spec scenario end to end — ONE selection stroke over
    # the patch through the real capture pipeline, a REAL renderer camera
    # orbit fed through the coordinator's arbiter-gated camera→tool
    # routing, a tap-commit paste whose clone is projected onto the Target
    # by the engine snapper (engine patch 0019 cyber_retopo_patch_clone),
    # and the session surviving its own commit for REPEATED pastes (two
    # pastes = two entries, byte-exact undo). The engine-op halves
    # (shared-vertex dedup, snap, flip winding) run against real meshes in
    # PlacementOpsTests; the UI test drives the auto-tool probe on the
    # seeded dome (selection → real camera orbit → paste → one-entry undo)
    # with a screenshot.
    Patch Clone round-trip:
      - MeshEditCameraToolTests/patchCloneRoundTripPastesProjectedCopiesRepeatably
      - MeshEditCameraToolTests/patchCloneFlipPastesMirroredPatch
      - MeshEditCameraToolTests/barrelRollRotatesArmedPatchClonePlacement
      - MeshEditCameraToolTests/cameraFeedIsGatedByTheArbiter
      - MeshEditCameraToolTests/theCameraToolGateClosesWhileThePenIsDown
      - MeshEditCameraToolTests/commitDoesNotBakeCameraMotionTheGateWithheld
      - PlacementOpsTests/patchCloneSharesCloneVertices
      - PlacementOpsTests/patchCloneSnapsToTarget
      - PlacementOpsTests/patchCloneFlipReversesWinding
      - CyberTopologyUITests/testPatchCloneToolProbeSelectsOrbitsAndPastes
    # Task 4.2: hold on a boundary vertex auto-selects the whole closed
    # rim (engine patch 0018 boundary walk), automatic mode steps
    # quad-sized rows off the accumulated camera displacement while the
    # user orbits (pure ExtendBoundaryPlan machine + the end-to-end feed
    # through the real renderer camera), nothing journals until commit —
    # then the WHOLE row stack lands as ONE entry (sequential engine
    # rings via the reported outer chains) and cancel discards it all.
    Extend Boundary automatic mode:
      - MeshEditCameraToolTests/extendBoundaryAutomaticModeStepsRowsWithTheCameraIntoOneEntry
      - MeshEditCameraToolTests/extendBoundaryCancelDiscardsAccumulatedRows
      # The mode's row state machine, and the engine ops it commits into.
      # (These were previously mis-filed under "Relax over pinned loop",
      # which they do not exercise at all — they never touch
      # MeshAnnotations.)
      - ExtendBoundaryPlanTests/automaticModeStepsQuadSizedRowsWhileTheCameraMoves
      - ExtendBoundaryPlanTests/onceModeStepsExactlyOneRowThenWantsAutoCommit
      - ExtendBoundaryPlanTests/automaticModeStopsSteppingAtTheRowLimit
      - ExtendBoundaryPlanTests/degenerateChainStepFloorsAtAFractionOfTheScene
      - PlacementOpsTests/extendBoundaryClosedChainWraps
      - PlacementOpsTests/extendBoundaryStacksRings
      - PlacementOpsTests/boundaryChainClosesAroundGrid
    # Task 4.3: the scenario end to end. The ENGINE assertion is the load
    # bearing one — AnnotationOpsTests/relaxHonorsPinnedLoop perturbs the
    # grid32 fixture, relaxes the WHOLE mesh through the real capi with a
    # pinned edge loop, and asserts pinned vertices are bit-exactly where
    # they were WHILE unpinned ones genuinely moved (a vacuous pass is
    # impossible: the companion relaxWithoutPinsMovesThoseVertices proves
    # those same vertices DO move when nothing is pinned). The app half
    # proves the pin set actually reaches the engine on every brush
    # sample: pins authored by the real Pin Flip hold gesture, then a real
    # Relax scrub through capture → controller → engine, asserted on
    # positions (id-independent, since the journaled payload round-trip
    # may reassign stable ids).
    Relax over pinned loop:
      - AnnotationOpsTests/relaxHonorsPinnedLoop
      - AnnotationOpsTests/relaxWithoutPinsMovesThoseVertices
      - AnnotationOpsTests/moveHonorsPins
      - AnnotationOpsTests/moveWithoutPinsDisplacesNeighbours
      - AnnotationToolsTests/relaxThroughTheControllerHonoursPins
      - AnnotationToolsTests/holdOnInteriorEdgePinsTheLoop
      - AnnotationToolsTests/committedPinLoopHoldFixture
      # Pins only stay meaningful if they survive the document round trip,
      # which COMPACTS element ids: these cover the reconciliation that
      # keeps a pin naming the same vertex after any delete/merge.
      - MeshIDCompactionTests/theMapPredictsTheRealRoundTripAfterADelete
      - MeshIDCompactionTests/pinsFollowTheirVerticesAcrossADelete
      - MeshIDCompactionTests/pinsOnRetiredVerticesAreDropped
      - MeshEditingTests/transactionReconcilesAnnotationsAcrossIDCompaction
      - MeshEditingTests/transactionKeepsAnnotationsWhenNoIdsMove
    # Task 4.4: 8-fold radial authoring end to end. The load-bearing test
    # is SymmetryToolsTests/eightFoldRadialAuthoringSnapsEveryCopy — it
    # drives ONE quad through the real create path with radialCount 8 and
    # asserts eight faces, every created vertex on the Target (checked
    # against a real SurfaceSnapper), copies in all eight sectors, and a
    # single undo removing all of them, because the replication happens
    # inside the stroke's one journaled command.
    #
    # HONEST SCOPE: this covers live radial AUTHORING, which is what the
    # scenario asks for. Radial BAKE (welding the sector seams into real
    # geometry) has no engine support and is deferred as task 4.4a.
    Radial symmetry editing:
      - SymmetryToolsTests/eightFoldRadialAuthoringSnapsEveryCopy
      - SymmetryToolsTests/undoingAMirroredAuthoringOpRemovesBothSides
      - SymmetryToolsTests/mirroredAuthoringCreatesBothSides
      - SymmetryToolsTests/multiAxisAuthoringFillsAllQuadrants
      - SymmetryToolsTests/centerLineVerticesWeldToThePlane
      # The seam must be WELDED, not merely snapped: the count/boundary
      # assertions the position-only test above cannot make.
      - SymmetryToolsTests/centerLineVerticesWeldIntoSharedSeamVertices
      - SymmetryOpsTests/seamVerticesWeldIntoOneSharedVertex
      - SymmetryOpsTests/radialReplicasSpanTheTurn
      - SymmetryOpsTests/replicaCounts
      - SymmetryOpsTests/centerLineVerticesSnapToThePlane
      - CyberTopologyUITests/testSymmetryProbeMirrorsAuthoredQuadAndUndoesBothSides
    # Task 4.4: re-symmetrize about a chosen axis, preserving topology
    # correspondence "where it exists". The engine assertions are the
    # load-bearing ones: resymmetrizeRestoresDriftedGeometry drifts one
    # half of a symmetric strip and asserts every off-side vertex is the
    # EXACT mirror of a working-side one afterwards with no faces or
    # vertices added or removed, and resymmetrizeReportsUnmatchedGeometry
    # proves one-sided geometry is reported rather than destroyed.
    Re-symmetrize:
      - SymmetryOpsTests/resymmetrizeRestoresDriftedGeometry
      - SymmetryOpsTests/resymmetrizeReportsUnmatchedGeometry
      - SymmetryOpsTests/resymmetrizeIsIdempotent
      - SymmetryToolsTests/resymmetrizeRestoresDriftedHalf
      - SymmetryToolsTests/resymmetrizeReportsToTheStatusLine
      - SymmetryToolsTests/applySymmetryBakesAsOneCommand
      - SymmetryOpsTests/applySymmetryMirrorsPerAxis
      - SymmetryOpsTests/applySymmetryHonoursTheOrigin
      - SymmetryOpsTests/applySymmetryAcrossTwoAxes
    # Task 4.5: the Auto Relax MODE end to end. The load-bearing test is
    # autoRelaxRedistributesNeighborsAfterAnAppendInOneJournalEntry — it
    # appends a quad through the REAL create path on a cage whose interior
    # column is deliberately off the even spacing, then asserts (a) that
    # column moved back toward even spacing and (b) the whole thing is
    # exactly ONE journal entry whose single undo restores the pre-append
    # payload byte-for-byte. autoRelaxOffLeavesNeighborsExactlyWhereTheyWere
    # is the anti-vacuity control (the same append with the mode off leaves
    # the neighbour bit-identical), and autoRelaxNeverMovesAPinnedVertex
    # proves the spec's "honoring pins" clause with an unpinned sibling as
    # its own anti-vacuity control — which is what task 4.3a left open.
    #
    # HONEST SCOPE - THE MODE IS NOT UNIVERSAL. Auto Relax runs on the
    # create paths (quad/grid draw and anything routed through applyCreate),
    # the element-edit GRAMMAR entries (insert loop, dissolve, merge,
    # rotate) and the Build Quad/Triangle drags. It does NOT run on: the
    # camera-as-manipulator tools (Patch Clone, Extend Boundary, Transform
    # Vertices), Surface Cut, Draw Strip, Path Distribute, the Merge Pair
    # TOOL (applyElementEdit with no autoRelaxAround, so the pass is
    # disabled) or the brush verbs Move / Tweak / Erase (MeshEditController
    # .commit journals without it). Every one of those is deferred as task
    # 4.5a; this list and 4.5a's are kept in step deliberately, because an
    # under-stated exclusion list is the thing that made the mode look
    # universal in the first place.
    Auto Relax after quad creation:
      - BatchCommandTests/autoRelaxRedistributesNeighborsAfterAnAppendInOneJournalEntry
      - BatchCommandTests/autoRelaxOffLeavesNeighborsExactlyWhereTheyWere
      - BatchCommandTests/autoRelaxNeverMovesAPinnedVertex
      - BatchCommandTests/autoRelaxBrushCoversThePointsPlusANeighbourRing
      - BatchCommandTests/autoRelaxModePersistsAcrossModels
    # Task 4.5: subdivide+reproject. The ENGINE assertion is the load
    # bearing one — BatchOpsTests/subdivideAndReprojectLandsOnTarget wraps
    # the grid32 fixture onto a DOMED Target, subdivides once, and asserts
    # every resulting vertex (the new ones counted explicitly) is within
    # 1e-3 of the Target surface, with an anti-vacuity control proving the
    # same vertices sit OFF the dome without the reprojection. The app half
    # runs it through the journaled batch path on the seeded dome cage, and
    # the UI test drives the real panel and asserts ONE undo restores the
    # coarse cage. The engine has LINEAR subdivision only — see 4.6/4.5a.
    Subdivide and reproject:
      - BatchOpsTests/subdivideAndReprojectLandsOnTarget
      - BatchOpsTests/subdivideQuadruples
      - BatchOpsTests/subdivideDeterminism
      - BatchOpsTests/subdivideReassignsIDs
      - BatchCommandTests/subdivideAndReprojectJournalsOnceAndLandsOnTheTarget
      - BatchCommandTests/subdivideClearsOrphanedPinsAndOneUndoRestoresThem
      - CyberTopologyUITests/testBatchPanelSubdividesTheCageAndOneUndoRestoresIt
    # Task 4.6: the subdivision preview.
    #
    # HONEST MAPPING — THE SHIPPED PREVIEW IS REPROJECTED-LINEAR, NOT
    # SMOOTH. The requirement says "1-2 level SMOOTH-subdivision preview
    # (with reprojection)". The engine has LINEAR subdivision only
    # (Mesh::linearSubdivide behind cyber_retopo_subdivide); there is no
    # Catmull-Clark / limit-surface evaluator anywhere in it. What ships and
    # what these tests assert is: subdivide linearly, then project every
    # resulting vertex onto the Target — which is what actually produces the
    # smooth surface a retopologist judges, and which degrades to a merely
    # DENSER cage when the document has no Target (asserted, and said out
    # loud in the UI caption). SubdivisionPreviewTests/
    # withoutATargetTheSubdivisionIsLinear is the deliberate proof of that
    # limitation, and the genuinely smooth pass is task 4.6a — NOT claimed
    # by this mapping.
    #
    # The SCENARIO itself ("the smoothed preview updates live while the
    # stored mesh remains the base cage") is fully covered: the app test
    # edits the base cage under level 2 and asserts the stored payload is
    # still the 16-face cage — same object count, same payload count — while
    # the preview mesh's positions changed; the CyberKit test asserts the
    # base handle is byte-identical after repeated derivations (element ids
    # included, which is what protects pins/tags from subdivide's id
    # reassignment); and the UI test drives the real settings control and
    # proves ONE undo reaches the seed import, i.e. the preview journaled
    # nothing at all.
    Editing under preview:
      - SubdivisionPreviewTests/previewNeverMutatesTheBase
      - SubdivisionPreviewTests/previewIsAnIndependentHandle
      - SubdivisionPreviewTests/reprojectionLiftsThePreview
      - SubdivisionPreviewTests/withoutATargetTheSubdivisionIsLinear
      - SubdivisionPreviewTests/previewGoldens
      - SubdivisionPreviewTests/throttlePolicy
      - SubdivisionPreviewViewportTests/editingUnderPreviewLeavesTheStoredCageUntouched
      - SubdivisionPreviewViewportTests/previewDerivationNeverTouchesTheLiveHandle
      - SubdivisionPreviewViewportTests/previewReprojectsOntoTheTarget
      - SubdivisionPreviewViewportTests/throttleSkipsExpensiveMidStrokeRebuilds
      - SubdivisionPreviewViewportTests/offscreenRenderDistinguishesPreviewOnAndOff
      - SubdivisionPreviewViewportTests/wireframeDrawsOverThePreview
      - CyberTopologyUITests/testSubdivisionPreviewIsNonDestructive
  pencil-interaction:
    # Task 3.1: XCUITest cannot synthesize Apple Pencil touches, so the
    # pen-side of the scenario is covered headless — the pure arbiter state
    # machine plus the UIKit glue driven by stubbed pencil/finger touches
    # (design D5: the arbiter is a pure struct precisely so this is
    # testable without hardware).
    Palm rejection during pen stroke:
      - InputArbiterTests/palmTouchesWhilePenIsDownAreRejected
      - InputArbiterTests/threeFingersDuringPenStrokeAreAllRejected
      - ViewportInputControllerTests/palmTouchesDuringPenStrokeDoNotAuthorOrReachCameraGates
      - ViewportInputControllerTests/palmAdmittedInThePenDownBatchTriggersARecognizerReset
    # Task 3.9 (spec change 2026-07-21, pencil-only authoring): fingers
    # NEVER author. The arbiter routes any finger stroke — quad-shaped
    # included — to the camera with no beginStroke decision under any verb;
    # the UIKit glue captures nothing from finger touches while the camera
    # gate keeps admitting them; and the UI test drags a quad-shaped finger
    # path on the live viewport asserting the object-list mesh counts stay
    # fixed, no stroke is captured/interpreted, and the journal gains no
    # entry (undo/redo state unchanged). Camera motion from the admitted
    # finger gestures is covered by
    # CyberTopologyUITests/testCameraGesturesDoNotConflictWithUndoTaps.
    Finger strokes never author:
      - InputArbiterTests/fingerQuadShapedStrokeNeverAuthorsAndStaysWithTheCamera
      - InputArbiterTests/fingerNeverAuthorsRegardlessOfActiveVerb
      - InputArbiterTests/fingerNavigatesByDefault
      - ViewportInputControllerTests/fingerQuadShapedStrokeIsNeverCapturedAndStaysCameraEligible
      - CyberTopologyUITests/testFingerStrokesNeverAuthorAndKeepNavigating
    Spring-loaded Relax:
      - InputArbiterTests/springLoadedHoldActivatesVerbForHoldDurationOnly
      - InputArbiterTests/penLiftMidChordKeepsTheHeldVerbUntilRelease
      - InputArbiterTests/releasingTheCurrentHoldRestoresAnOlderStillHeldOne
      - CyberTopologyUITests/testVerbToolbarTapSelectsAndHoldRestores
      - MeshEditControllerTests/relaxScrubSmoothsUnderTheBrushAndJournalsOnce
    # Task 3.3: Move's surface-geodesic falloff (engine Dijkstra over edge
    # lengths) leaves disconnected components bit-identical even 0.2 units
    # away in space — engine ops through CyberKit plus the app-level verb
    # drag through the real capture→controller pipeline.
    Geodesic Move falloff:
      - MeshEditingTests/moveAppliesGeodesicFalloff
      - MeshEditingTests/moveIgnoresDisconnectedComponent
      - MeshEditControllerTests/moveDragsWithGeodesicFalloffIgnoringDisconnectedComponent
    # Task 3.4: both halves against the same committed grid32 mesh + the
    # real engine recognizer — a stroke ACROSS the quad ring interprets as
    # insertLoop whose elements walk the WHOLE ring (engine loop walk, capi
    # cyber_retopo_insert_loop splits every ring quad), a stroke ALONG the
    # loop interprets as tagLoop carrying the whole loop; the app-level
    # tests replay both strokes through capture → recognizer → controller
    # and assert the resulting mesh/annotation state plus undo.
    Loop insert vs loop tag disambiguation:
      - StrokeInterpreterTests/lineAcrossRingResolvesFullLoopInsert
      - StrokeInterpreterTests/lineAlongLoopResolvesWholeLoopTag
      - MeshEditControllerTests/lineAcrossRingInsertsFullEdgeLoopAndUndoRestoresBytes
      - MeshEditControllerTests/lineAlongLoopTagsWholeLoopWithColoredRenderAndUndoClears
    # Task 3.5: the spec's exact misrecognition pair, driven through the
    # REAL engine recognizer — an along-the-loop stroke (recorded with the
    # corpus's standard hand wobble) applies as tagLoop with insertLoop
    # ranked as the alternative; one tap rebuilds the alternative from the
    # byte-exact pre-stroke snapshot and the document swaps the journaled
    # command IN PLACE (UndoJournal.replaceCurrent +
    # TopoDocument.performReplacingLast): exactly one journal entry after
    # the swap, a single undo steps over it, stale chips (undo landed
    # first) are rejected untouched. The UI test drives the finger
    # injection path end to end — stroke, chip, alternative tap, mesh
    # counts, and the undo-gesture journal invariant.
    One-tap misrecognition fix:
      - MeshEditControllerTests/tagLoopStrokeSwapsToInsertLoopInPlace
      - MeshEditControllerTests/ringStrokeOnSeededStripSwapsToInsertLoopViaTheModel
      - MeshEditControllerTests/alternativeSwapAfterUndoIsRejectedUntouched
      - UndoJournalTests/replaceCurrentKeepsExactlyOneEntry
      - TopoDocumentUndoTests/performReplacingLastSwapsAtomicallyAndGuardsStaleChips
      - InterpretationChipStateTests/nextStrokeWhileVisibleDismissesImmediately
      - CyberTopologyUITests/testInterpretationChipSwapsAlternativeInPlace
    # Task 3.6: hover probes drive the FULL query path the hover recognizer
    # feeds — coordinator entry → live camera ray → engine Target raycast →
    # engine nearest-edge pick → interior-edge gate → the REAL engine
    # edge-loop walk (cyber_mesh_edge_loop) → published preview → the real
    # Metal overlay highlight pass — asserting the highlighted loop equals
    # the engine's independently recomputed loop AND the mesh is unmodified
    # (nothing journaled, byte-identical payload). Only the
    # UIHoverGestureRecognizer event delivery itself is untestable off
    # hardware; that half is an explicit device-only XCTSkip counted
    # against the device test plan (task 9.6).
    Hover over an edge:
      - HoverPreviewTests/hoverOverInteriorEdgeHighlightsTheSlideLoopWithoutModifyingTheMesh
      - HoverPreviewTests/hoverOverBoundaryEdgeShowsNoPreview
      - HoverPreviewTests/movingAlongTheSameLoopDoesNotRepublishRenderState
      - HoverHardwareTests/testPencilHoverDeliveryOnHoverCapableHardware
    # Task 3.7 — the scenario splits at the hardware boundary, mapped
    # honestly: the PRE-HIGHLIGHT half ("the target SHALL highlight before
    # commit") plus the merge-on-commit and the event→feedback mapping run
    # on simulator through the REAL pipeline — capture → Tweak/Move session
    # → engine nearest-vertex-excluding query (patch 0014) → published
    # snap-target highlight in the real overlay highlight pass, with the
    # merge journaled as ONE command and ticks recorded via the injected
    # haptic seam (SnapFeedbackState / SnapHapticsPlaying). The haptic
    # ACTUATION half ("a haptic tick SHALL fire" as something the user
    # FEELS — Core Haptics / Pencil Pro actuator) is hardware-only: an
    # explicit device-only XCTSkip counted against the device test plan
    # (task 9.6), like Pencil hover above.
    Snap feedback:
      - MeshEditControllerTests/tweakDragWithinMergeRangeHighlightsBeforeCommitThenMergesWithOneEntry
      - MeshEditControllerTests/moveDragSnapsSeedPositionOntoDisconnectedVertexWithoutTopologyMerge
      - MeshEditControllerTests/disabledSnapHapticsStillHighlightAndMergeButNeverTick
      - MeshEditControllerTests/tweakEndingOutsideMergeRangeNeitherMergesNorTicksCommit
      - MeshEditControllerTests/cancelledSnapDragClearsHighlightWithoutCommitting
      - SnapFeedbackTests/enteringMergeRangeHighlightsAndTicksOnce
      - SnapFeedbackTests/committedMergeClearsHighlightAndTicks
      - SnapFeedbackTests/disabledHapticsDropTicksButKeepTheHighlight
      - PencilProHardwareTests/testSnapHapticTickActuatesOnHardware
    # Task 3.8: the UI test drives the real customization loop on the
    # Action Gallery's slot editor — quick-assign (double-tap), tap-assign,
    # replace, remove — then relaunches WITHOUT the reset argument and
    # asserts the customized toolbar (custom slot + verb slots) is restored
