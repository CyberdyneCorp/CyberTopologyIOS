name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  openspec:
    name: OpenSpec validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g @fission-ai/openspec@latest
      - run: openspec validate --all --strict

  build:
    name: Build (iOS Simulator)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version
      - name: Install XcodeGen + Ninja
        run: brew install xcodegen ninja
      - name: Engine cache key
        id: engine
        run: echo "commit=$(git ls-tree HEAD Engine/CyberRemesherAndUV --object-only)" >> "$GITHUB_OUTPUT"
      - name: Cache engine build
        uses: actions/cache@v4
        with:
          path: |
            Engine/build
            CyberKit/Binaries
          key: engine-${{ runner.os }}-${{ steps.engine.outputs.commit }}-${{ hashFiles('scripts/build_engine.sh', 'Engine/patches/**') }}
      - name: Build engine (simulator slice)
        run: scripts/build_engine.sh --sim-only
      - name: Generate project
        run: xcodegen generate
      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project CyberTopology.xcodeproj \
            -scheme CyberTopology \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            | tail -50

  test:
    name: Test (iOS Simulator)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version
      - name: Install XcodeGen + Ninja
        run: brew install xcodegen ninja
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install script dependencies
        run: python3 -m pip install --quiet pyyaml
      - name: Traceability checker unit tests
        run: python3 -m unittest discover -s scripts -p 'test_*.py' -v
      - name: Spec scenario traceability check
        run: python3 scripts/check_traceability.py
      - name: Engine cache key
        id: engine
        run: echo "commit=$(git ls-tree HEAD Engine/CyberRemesherAndUV --object-only)" >> "$GITHUB_OUTPUT"
      - name: Cache engine build
        uses: actions/cache@v4
        with:
          path: |
            Engine/build
            CyberKit/Binaries
          key: engine-${{ runner.os }}-${{ steps.engine.outputs.commit }}-${{ hashFiles('scripts/build_engine.sh', 'Engine/patches/**') }}
      - name: Build engine (simulator slice)
        run: scripts/build_engine.sh --sim-only
      - name: Generate project
        run: xcodegen generate
      - name: Run tests with coverage + gate
        run: bash scripts/coverage_gate.sh
        env:
          RESULT_BUNDLE: ${{ runner.temp }}/CyberTopology.xcresult
          # Virtualized runners cannot faithfully synthesize multi-finger
          # taps or drive hardware Metal; interaction UI tests classify
          # themselves as skipped here and are contractually required on
          # the local simulator and the device plan (task 9.6) instead.
          TEST_RUNNER_CYBERTOPOLOGY_SKIP_INTERACTION_UITESTS: "1"
      - name: Upload result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-xcresult
          path: ${{ runner.temp }}/CyberTopology.xcresult
          if-no-files-found: ignore
